name: Index EDS Docs

on:
  workflow_dispatch:
    inputs:
      eds_ref:
        description: 'EDS git ref to build (tag, branch, or commit SHA)'
        type: string
        default: main
      clean:
        description: 'Delete existing embeddings before indexing'
        type: boolean
        default: false
      environment:
        description: 'GitHub environment with Azure credentials'
        type: string
        required: true

  schedule:
    # Every Monday 06:00 UTC — check for new EDS releases
    - cron: '0 6 * * 1'

env:
  EDS_REPO: equinor/design-system
  TAG_NAME: last-indexed/eds
  CONFIG_PATH: ./fusion-ai.config.eds.ts

concurrency:
  group: index-eds
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-ref:
    name: Resolve EDS ref
    runs-on: ubuntu-latest
    outputs:
      eds_ref: ${{ steps.resolve.outputs.eds_ref }}
      skip: ${{ steps.resolve.outputs.skip }}
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve ref and detect changes
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_EDS_REF: ${{ inputs.eds_ref }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "eds_ref=${INPUT_EDS_REF}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "environment=${INPUT_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dispatch — building EDS ref: ${INPUT_EDS_REF}"
            exit 0
          fi

          # Scheduled run: find the latest @equinor/eds-core-react release
          latest_tag=$(gh release list -R "$EDS_REPO" --limit 20 \
            --json tagName,isLatest \
            --jq '[.[] | select(.tagName | startswith("@equinor/eds-core-react@"))] | first | .tagName // empty')

          if [[ -z "$latest_tag" ]]; then
            echo "::warning::No @equinor/eds-core-react release found"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::Latest EDS release: ${latest_tag}"
          echo "eds_ref=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "environment=eds-index" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: steps.resolve.outputs.skip != 'true'
        run: |
          echo "### EDS ref: ${{ steps.resolve.outputs.eds_ref }}" >> "$GITHUB_STEP_SUMMARY"

  build-eds:
    name: Build EDS docs
    needs: resolve-ref
    if: needs.resolve-ref.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build EDS and extract docs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.eds
          target: export
          outputs: type=local,dest=eds-content
          build-args: |
            EDS_REF=${{ needs.resolve-ref.outputs.eds_ref }}
          cache-from: type=gha,scope=eds-build
          cache-to: type=gha,scope=eds-build,mode=max

      - name: Verify output
        run: |
          set -euo pipefail
          count=$(find eds-content -name '*.md' | wc -l)
          echo "::notice::Extracted ${count} markdown files"
          if [[ "$count" -eq 0 ]]; then
            echo "::error::No markdown files extracted — aborting"
            exit 1
          fi

      - name: Upload extracted docs
        uses: actions/upload-artifact@v7
        with:
          name: eds-docs
          path: eds-content/
          retention-days: 7

  index-eds:
    name: Index EDS to search
    needs: [resolve-ref, build-eds]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-ref.outputs.environment }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download extracted docs
        uses: actions/download-artifact@v8
        with:
          name: eds-docs
          path: eds-content/

      - name: Setup node and install deps
        uses: ./.github/actions/node-setup

      - name: Build CLI
        run: pnpm build:cli

      - name: Install built CLI
        run: pnpm install -w ./packages/cli

      - name: Index EDS docs to Azure AI Search
        timeout-minutes: 10
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_INSTANCE_NAME: ${{ vars.AZURE_OPENAI_INSTANCE_NAME }}
          AZURE_SEARCH_ENDPOINT: ${{ vars.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          INPUT_CLEAN: ${{ inputs.clean }}
        run: |
          set -euo pipefail

          if [[ "${INPUT_CLEAN:-false}" == "true" ]]; then
            echo "::notice::Running clean rebuild — deleting existing EDS embeddings first"
            pnpm exec ffc ai index add --clean --config "$CONFIG_PATH"
          else
            echo "::notice::Running full EDS indexing"
            pnpm exec ffc ai index add --config "$CONFIG_PATH"
          fi

      - name: Configure git user
        if: success()
        uses: ./.github/actions/config-git-user

      - name: Update tracking tag
        if: success()
        env:
          EDS_REF: ${{ needs.resolve-ref.outputs.eds_ref }}
        run: |
          set -euo pipefail
          git tag -f -m "last indexed EDS ref: ${EDS_REF}" "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Execution summary
        if: always()
        env:
          EDS_REF: ${{ needs.resolve-ref.outputs.eds_ref }}
          EXECUTION_STATUS: ${{ job.status }}
          SEARCH_INDEX_NAME: ${{ vars.AZURE_SEARCH_INDEX_NAME }}
        run: |
          set -euo pipefail

          if [[ "$EXECUTION_STATUS" == "success" ]]; then
            outcome="Indexing completed successfully."
          else
            outcome="Indexing failed — tracking tag was not updated."
          fi

          {
            echo '# EDS Index Summary'
            echo
            echo "$outcome"
            echo
            echo '| Field | Value |'
            echo '| --- | --- |'
            echo "| Status | $EXECUTION_STATUS |"
            echo "| EDS ref | $EDS_REF |"
            echo "| Search index | ${SEARCH_INDEX_NAME:-n/a} |"
            echo "| Tracking tag | $TAG_NAME |"
            echo "| Commit | $GITHUB_SHA |"
          } >> "$GITHUB_STEP_SUMMARY"
