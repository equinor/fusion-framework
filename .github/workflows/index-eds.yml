name: Index EDS Docs

on:
  workflow_dispatch:
    inputs:
      eds_ref:
        description: 'EDS git ref to build (tag, branch, or commit SHA)'
        type: string
        default: main
      clean:
        description: 'Delete existing embeddings before indexing'
        type: boolean
        default: false
      environment:
        description: 'GitHub environment with Azure credentials'
        type: string
        required: true

  schedule:
    # Every Monday 06:00 UTC — check for new EDS releases
    - cron: '0 6 * * 1'

env:
  EDS_REPO: equinor/design-system
  CONFIG_PATH: ./fusion-ai.config.eds.ts

concurrency:
  group: index-eds
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-ref:
    name: Resolve EDS ref
    runs-on: ubuntu-latest
    outputs:
      eds_ref: ${{ steps.resolve.outputs.eds_ref }}
      skip: ${{ steps.resolve.outputs.skip }}
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve ref and detect changes
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_EDS_REF: ${{ inputs.eds_ref }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "eds_ref=${INPUT_EDS_REF}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "environment=${INPUT_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual dispatch — building EDS ref: ${INPUT_EDS_REF}"
            exit 0
          fi

          # Scheduled run: find the latest @equinor/eds-core-react release
          latest_tag=$(gh release list -R "$EDS_REPO" --limit 20 \
            --json tagName,isLatest \
            --jq '[.[] | select(.tagName | startswith("@equinor/eds-core-react@"))] | first | .tagName // empty')

          if [[ -z "$latest_tag" ]]; then
            echo "::warning::No @equinor/eds-core-react release found"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::Latest EDS release: ${latest_tag}"

          # Compare against the last-indexed ref stored in the tracking tag.
          # Annotated tags require two API calls: ref → tag object → message.
          last_indexed=""
          tag_sha=$(gh api "repos/${{ github.repository }}/git/refs/tags/eds-index/main" \
            --jq '.object.sha' 2>/dev/null) || true
          if [[ -n "$tag_sha" ]]; then
            last_indexed=$(gh api "repos/${{ github.repository }}/git/tags/${tag_sha}" \
              --jq '.message' 2>/dev/null \
              | sed -n 's/^last indexed EDS ref: //p') || true
          fi

          if [[ -n "$last_indexed" && "$latest_tag" == "$last_indexed" ]]; then
            echo "::notice::EDS ref ${latest_tag} already indexed — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "eds_ref=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "environment=docs" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: steps.resolve.outputs.skip != 'true'
        run: |
          echo "### EDS ref: ${{ steps.resolve.outputs.eds_ref }}" >> "$GITHUB_STEP_SUMMARY"

  build-eds:
    name: Build EDS docs
    needs: resolve-ref
    if: needs.resolve-ref.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build EDS and extract docs
        uses: docker/build-push-action@v7
        with:
          context: ./eds
          file: eds/Dockerfile
          target: export
          outputs: type=local,dest=eds-content
          build-args: |
            EDS_REF=${{ needs.resolve-ref.outputs.eds_ref }}
          cache-from: type=gha,scope=eds-build
          cache-to: type=gha,scope=eds-build,mode=max

      - name: Verify output
        run: |
          set -euo pipefail
          count=$(find eds-content -name '*.md' | wc -l)
          echo "::notice::Extracted ${count} markdown files"
          if [[ "$count" -eq 0 ]]; then
            echo "::error::No markdown files extracted — aborting"
            exit 1
          fi

      - name: Upload extracted docs
        uses: actions/upload-artifact@v7
        with:
          name: eds-docs
          path: eds-content/
          retention-days: 7

  index-eds:
    name: Index EDS to search
    needs: [resolve-ref, build-eds]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-ref.outputs.environment }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download extracted docs
        uses: actions/download-artifact@v8
        with:
          name: eds-docs
          path: eds-content/

      - name: Setup node and install deps
        uses: ./.github/actions/node-setup

      - name: Cache turbo builds
        uses: actions/cache@v4
        with:
          path: |
            .turbo
            **/.turbo
          key: ${{ runner.os }}-turbo-cli-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/cli/**', 'packages/utils/**', 'packages/modules/**') }}
          restore-keys: |
            ${{ runner.os }}-turbo-cli-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-cli-

      - name: Build CLI
        run: pnpm build:cli

      - name: Install built CLI
        run: pnpm install -w ./packages/cli

      - name: Read index name from config
        id: index
        run: |
          index_name=$(node -e "import('$CONFIG_PATH').then(m => console.log(m.default.index.name))")
          tag_name="${index_name}/${GITHUB_REF_NAME}"
          echo "name=${index_name}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "::notice::Index name: ${index_name}"
          echo "::notice::Tracking tag: ${tag_name}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.FUSION_AI_SP_CLIENT_ID }}
          tenant-id: 3aa4a235-b6e2-48d5-9195-7fcf05b459b0
          allow-no-subscriptions: true

      - name: Acquire Fusion token
        run: |
          token=$(az account get-access-token \
            --scope ${{ vars.FUSION_AI_SP_SCOPE }}\
            --query accessToken --output tsv)
          echo "::add-mask::${token}"
          echo "FUSION_TOKEN=${token}" >> "$GITHUB_ENV"

      - name: Ensure index exists
        env:
          FUSION_ENV: ${{ vars.FUSION_ENV }}
        run: pnpm exec ffc ai index create --env "$FUSION_ENV" --config "$CONFIG_PATH"

      - name: Index EDS docs to Azure AI Search
        timeout-minutes: 10
        env:
          INPUT_CLEAN: ${{ inputs.clean }}
          FUSION_ENV: ${{ vars.FUSION_ENV }}
        run: |
          set -euo pipefail

          if [[ "${INPUT_CLEAN:-false}" == "true" ]]; then
            echo "::notice::Running clean rebuild — deleting existing EDS embeddings first"
            pnpm exec ffc ai index add --clean --env "$FUSION_ENV" --config "$CONFIG_PATH"
          else
            echo "::notice::Running full EDS indexing"
            pnpm exec ffc ai index add --env "$FUSION_ENV" --config "$CONFIG_PATH"
          fi

      - name: Configure git user
        if: success()
        uses: ./.github/actions/config-git-user

      - name: Update tracking tag
        if: success()
        env:
          EDS_REF: ${{ needs.resolve-ref.outputs.eds_ref }}
          TAG_NAME: ${{ steps.index.outputs.tag_name }}
        run: |
          set -euo pipefail
          git tag -f -m "last indexed EDS ref: ${EDS_REF}" "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/${TAG_NAME}" --force

      - name: Execution summary
        if: always()
        env:
          EDS_REF: ${{ needs.resolve-ref.outputs.eds_ref }}
          EXECUTION_STATUS: ${{ job.status }}
          SEARCH_INDEX_NAME: ${{ steps.index.outputs.name }}
          TAG_NAME: ${{ steps.index.outputs.tag_name }}
        run: |
          set -euo pipefail

          if [[ "$EXECUTION_STATUS" == "success" ]]; then
            outcome="Indexing completed successfully."
          else
            outcome="Indexing failed — tracking tag was not updated."
          fi

          {
            echo '# EDS Index Summary'
            echo
            echo "$outcome"
            echo
            echo '| Field | Value |'
            echo '| --- | --- |'
            echo "| Status | $EXECUTION_STATUS |"
            echo "| EDS ref | $EDS_REF |"
            echo "| Search index | ${SEARCH_INDEX_NAME:-n/a} |"
            echo "| Tracking tag | $TAG_NAME |"
            echo "| Commit | $GITHUB_SHA |"
          } >> "$GITHUB_STEP_SUMMARY"
