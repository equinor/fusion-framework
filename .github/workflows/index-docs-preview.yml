# Indexes documentation into the Fusion MCP search index (preview environment).
#
# Triggers on pushes to the react-19 branch when documentation-relevant files
# change — package docs, READMEs, TypeScript source (for TSDoc extraction),
# cookbook examples, or the indexer configuration itself.
#
# Delegates to the reusable index-docs.yml workflow with the "preview"
# environment and a branch-specific tag so the indexer tracks incremental
# progress per branch.

name: Index Docs Preview

on:
  push:
    branches:
      - react-19
    paths:
      - 'packages/**/docs/**'
      - 'packages/**/README.md'
      - 'packages/**/src/**/*.{ts,tsx}'
      - 'cookbooks/**/*.{ts,tsx}'
      - 'cookbooks/**/README.md'
      - 'fusion-ai.config.ts'
      - '.github/workflows/index-docs.yml'
      - '.github/workflows/index-docs-preview.yml'

# Needs write access to push the last-indexed-commit tag
permissions:
  contents: write

jobs:
  index-docs:
    uses: ./.github/workflows/index-docs.yml
    with:
      environment: preview
      # Lightweight tag used by the indexer to track the last indexed commit
      # on this branch, enabling incremental re-indexing on subsequent pushes.
      tag_name: indexer/preview/react-19/last-commit
    secrets: inherit